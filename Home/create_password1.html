<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="../Administrador/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../Administrador/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../Administrador/favicon-16x16.png">
  <link rel="manifest" href="../Administrador/site.webmanifest">
  <title>Crear Contraseña</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconos -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md px-4">

    <!-- VOLVER -->
    <div class="mb-6">
      <button id="btnVolver" class="flex items-center text-blue-500">
        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
        Volver
      </button>
    </div>

    <!-- TARJETA -->
    <div class="border-2 rounded-2xl bg-white p-6 shadow"
         style="border-color:#3e8cdd;">

      <!-- ICONO -->
      <div class="flex justify-center mb-4">
        <div class="p-4 rounded-full" style="background:#3e8cdd;">
          <i data-lucide="lock" class="text-white w-8 h-8"></i>
        </div>
      </div>

      <h2 class="text-center text-xl font-bold mb-2"
          style="color:#3e8cdd;">
        Crea tu Contraseña Segura
      </h2>

      <p class="text-center text-gray-600 mb-4">
        Configura una contraseña segura
      </p>

      <!-- DATOS -->
      <div class="bg-blue-50 p-3 rounded-lg border mb-4">
        <p><strong>Cuenta para:</strong> <span id="nombre"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
      </div>

      <!-- FORMULARIO -->
      <form id="formulario" class="space-y-4">

        <!-- PASSWORD -->
        <div>
          <label class="block text-sm">Contraseña *</label>
          <div class="relative">
            <input id="password" type="password"
                   class="w-full border p-2 rounded">
            <button type="button" id="togglePass"
              class="absolute right-2 top-2 text-gray-500">
              👁
            </button>
          </div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div>
          <label class="block text-sm">Confirmar *</label>
          <div class="relative">
            <input id="confirmPassword" type="password"
                   class="w-full border p-2 rounded">
            <button type="button" id="toggleConfirm"
              class="absolute right-2 top-2 text-gray-500">
              👁
            </button>
          </div>
        </div>

        <!-- ERROR -->
        <div id="errorMatch" class="hidden text-red-600 text-sm">
          Las contraseñas no coinciden
        </div>

        <!-- REQUISITOS -->
        <div class="bg-gray-50 p-4 rounded">
          <p class="font-semibold text-sm mb-2">Requisitos:</p>

          <ul class="text-sm space-y-1">
            <li id="r1">❌ Mínimo 8 caracteres</li>
            <li id="r2">❌ Mayúscula</li>
            <li id="r3">❌ Minúscula</li>
            <li id="r4">❌ Número</li>
            <li id="r5">❌ Especial</li>
          </ul>
        </div>

        <!-- BOTÓN -->
        <button id="btnSubmit"
          class="w-full text-white py-2 rounded"
          style="background:#74cb3c;">
          Crear Cuenta
        </button>

      </form>

    </div>

  </div>

  <!-- ============================== -->
  <!-- JAVASCRIPT -->
  <!-- ============================== -->
  <script>

    // ==============================
    // VARIABLES (estado tipo React)
    // ==============================

    let showPassword = false;
    let showConfirm = false;

    // ==============================
    // DATOS DEL CLIENTE (desde sessionStorage — guardados en paso anterior)
    // ==============================

    const registrationData = JSON.parse(sessionStorage.getItem("registrationData")) || null;

    // ==============================
    // CARGAR DATOS
    // ==============================

    function cargarDatos() {
      if (!registrationData) return;
      document.getElementById("nombre").textContent = registrationData.fullName || '';
      document.getElementById("email").textContent = registrationData.email || '';
    }

    // ==============================
    // VALIDAR PASSWORD
    // ==============================

    function validarPassword(password) {
      return {
        length: password.length >= 8,
        upper: /[A-Z]/.test(password),
        lower: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*]/.test(password)
      };
    }

    // ==============================
    // ACTUALIZAR REQUISITOS
    // ==============================

    function actualizarRequisitos() {
      const pass = document.getElementById("password").value;
      const r = validarPassword(pass);

      setEstado("r1", r.length);
      setEstado("r2", r.upper);
      setEstado("r3", r.lower);
      setEstado("r4", r.number);
      setEstado("r5", r.special);
    }

    function setEstado(id, cumple) {
      const el = document.getElementById(id);
      el.textContent = (cumple ? "✅ " : "❌ ") + el.textContent.slice(2);
    }

    // ==============================
    // VALIDAR COINCIDENCIA
    // ==============================

    function validarCoincidencia() {
      const p1 = document.getElementById("password").value;
      const p2 = document.getElementById("confirmPassword").value;

      const error = document.getElementById("errorMatch");

      if (p2 && p1 !== p2) {
        error.classList.remove("hidden");
      } else {
        error.classList.add("hidden");
      }
    }

    // ==============================
    // MOSTRAR / OCULTAR PASSWORD
    // ==============================

    function togglePassword() {
      const input = document.getElementById("password");
      showPassword = !showPassword;
      input.type = showPassword ? "text" : "password";
    }

    function toggleConfirm() {
      const input = document.getElementById("confirmPassword");
      showConfirm = !showConfirm;
      input.type = showConfirm ? "text" : "password";
    }

    // ==============================
    // VALIDACIÓN GENERAL
    // ==============================

    function esValida(password) {
      const r = validarPassword(password);
      return Object.values(r).every(v => v);
    }

    // ==============================
    // SUBMIT — Guarda en BD vía API (NO en localStorage)
    // ==============================

    let submitting = false;

    function crearCuenta(e) {
      e.preventDefault();
      if (submitting) return;

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (!esValida(password)) {
        alert("La contraseña no cumple todos los requisitos de seguridad.");
        return;
      }

      if (password !== confirm) {
        document.getElementById("errorMatch").classList.remove("hidden");
        return;
      }

      // Verificar que tengamos el correo del cliente
      if (!registrationData || !registrationData.email) {
        alert("Error: no se encontraron los datos de registro. Por favor inicia el proceso desde el principio.");
        window.location.href = "UnifiedLogin.php";
        return;
      }

      submitting = true;
      const btn = document.getElementById("btnSubmit");
      btn.disabled = true;
      btn.textContent = "Creando cuenta...";

      // Enviar contraseña al servidor para hashear y guardar en BD
      fetch("../PHP/api_registro_password.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          accion: "crear_password",
          correo: registrationData.email,
          password: password
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          // Limpiar datos temporales de sesión
          sessionStorage.removeItem("registrationData");

          alert(data.message || "Registro completado correctamente, ya puedes iniciar sesión");

          // Redirigir al login unificado
          setTimeout(() => {
            window.location.href = "UnifiedLogin.php";
          }, 500);
        } else {
          alert(data.message || "Error al crear la cuenta.");
          btn.disabled = false;
          btn.textContent = "Crear Cuenta";
          submitting = false;
        }
      })
      .catch(() => {
        alert("Error de conexión. Verifica que el servidor esté activo.");
        btn.disabled = false;
        btn.textContent = "Crear Cuenta";
        submitting = false;
      });
    }

    // ==============================
    // EVENTOS
    // ==============================

    document.addEventListener("DOMContentLoaded", () => {

      // Si no hay datos de registro en sessionStorage, redirigir al inicio del flujo
      if (!sessionStorage.getItem("registrationData")) {
        window.location.href = "UnifiedLogin.php";
        return;
      }

      cargarDatos();

      document.getElementById("password")
        .addEventListener("input", actualizarRequisitos);

      document.getElementById("confirmPassword")
        .addEventListener("input", validarCoincidencia);

      document.getElementById("togglePass")
        .addEventListener("click", togglePassword);

      document.getElementById("toggleConfirm")
        .addEventListener("click", toggleConfirm);

      document.getElementById("formulario")
        .addEventListener("submit", crearCuenta);

      document.getElementById("btnVolver")
        .addEventListener("click", () => {
          window.location.href = "UnifiedLogin.php";
        });

      lucide.createIcons();
    });

  </script>

</body>
</html>
